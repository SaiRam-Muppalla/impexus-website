    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What types of programs does Impexus offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Impexus offers technical skill development programs (Full Stack, Cloud, AI/ML, Cybersecurity, Mobile), placement preparation, soft skills training, hackathons, and project-based learning — all delivered on campus."
          }
        },
        {
          "@type": "Question",
          "name": "How are programs delivered within colleges?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Programs are delivered on-campus and integrated with academic schedules. Formats include intensive bootcamps, semester-long courses, workshop series, hackathons, and certification-oriented programs."
          }
        },
        {
          "@type": "Question",
          "name": "Who can enroll in Impexus programs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any student enrolled at a partner institution can participate. Programs are designed for students across all years, from foundational skill building to advanced career readiness."
          }
        },
        {
          "@type": "Question",
          "name": "How can our college partner with Impexus?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Institutions can reach out through our contact form or email. We work closely with college leadership to design programs that align with curriculum goals and student needs."
          }
        },
        {
          "@type": "Question",
          "name": "Are certifications provided upon program completion?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, students receive certificates upon successful completion of each program, which can be used to demonstrate skills to potential employers."
          }
        },
        {
          "@type": "Question",
          "name": "What technologies are covered in the programs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our stack spans C, Java, Python, JavaScript, React, Node.js, AWS, Docker, Kubernetes, TensorFlow, and more — all aligned with current industry demand."
          }
        },
        {
          "@type": "Question",
          "name": "Does Impexus help with student placements?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Our placement preparation programs include aptitude training, competitive coding practice, mock interviews, resume building, and technical interview preparation."
          }
        },
        {
          "@type": "Question",
          "name": "What is the duration of a typical program?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It varies by format — bootcamps run 1–4 weeks, semester programs span 3–6 months, and workshops can be single or multi-day events. We customize based on institutional needs."
          }
        }
      ]
    }
    </script>
